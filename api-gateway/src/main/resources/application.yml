server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/users/**, /api/v1/auth/**
          filters:
            - name: CircuitBreaker
              args:
                name: userService
                fallbackUri: forward:/fallback/user

        - id: product-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/products/**, /api/v1/categories/**
          filters:
            - name: CircuitBreaker
              args:
                name: productService
                fallbackUri: forward:/fallback/product

        - id: order-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/orders/**
          filters:
            - AuthenticationFilter
            - name: CircuitBreaker
              args:
                name: orderService
                fallbackUri: forward:/fallback/order

        - id: payment-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/payments/**
          filters:
            - AuthenticationFilter
            - name: CircuitBreaker
              args:
                name: paymentService
                fallbackUri: forward:/fallback/payment

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"

  data:
    redis:
      host: localhost
      port: 6379
      password: redis123

  security:
    jwt:
      secret: amazon-super-secret-jwt-key-2024-minimum-256-bits-required
      expiration: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,gateway
  metrics:
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

---
spring:
  config:
    activate:
      on-profile: docker
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://user-service:8081
          predicates:
            - Path=/api/v1/users/**, /api/v1/auth/**
        - id: product-service
          uri: http://product-service:8082
          predicates:
            - Path=/api/v1/products/**, /api/v1/categories/**
        - id: order-service
          uri: http://order-service:8083
          predicates:
            - Path=/api/v1/orders/**
          filters:
            - AuthenticationFilter
        - id: payment-service
          uri: http://payment-service:8084
          predicates:
            - Path=/api/v1/payments/**
          filters:
            - AuthenticationFilter
  data:
    redis:
      host: redis
      port: 6379
      password: redis123
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans

