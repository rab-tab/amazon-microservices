server:
  port: 8082

spring:
  application:
    name: product-service
  datasource:
    url: jdbc:postgresql://localhost:5432/products_db
    username: amazon
    password: amazon123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: localhost
      port: 6379
      password: redis123
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: product-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  cache:
    type: redis

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: product-service
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

---
# ── CI / local-test profile ──────────────────────────────────────
# Activated when SPRING_PROFILES_ACTIVE=local-test (set by docker-compose)
# WHY separate profile? Keeps production config clean while letting CI
# override the slow/heavy settings that cause 600s+ startup times.
spring:
  config:
    activate:
      on-profile: local-test
  jpa:
    hibernate:
      # WHY create-drop? In CI the DB is fresh every run (tmpfs postgres).
      # 'update' diffs the existing schema which takes 10-30s.
      # 'create-drop' skips the diff and just creates tables directly.
      ddl-auto: create-drop
  cache:
    # WHY none? Disabling Redis cache in CI removes the Redis connection
    # dependency at startup. The app still works — just no caching.
    # Redis connection timeouts were causing 13-58s delays per health check.
    type: none

management:
  tracing:
    sampling:
      # WHY 0.0? Zipkin tracing at 1.0 sends every request span to Zipkin.
      # Under memory pressure Zipkin drops spans and logs 11s timeout errors
      # that block the actuator health thread. Zero tracing = zero overhead.
      probability: 0.0