# ═══════════════════════════════════════════════════════════════════
# Live Environment Docker Compose — t2.micro / t3.micro
#
# Everything on one EC2 instance: DB, Redis, Kafka + 6 services
# Total ~1.8GB peak → needs 4GB swap (set up by bootstrap script)
#
# Memory allocation:
#   postgres:             160MB
#   redis:                 80MB
#   zookeeper:            160MB
#   kafka:                300MB
#   6 x services:         ~96MB each = 576MB
#   ─────────────────────────────
#   Subtotal:           1,276MB  (fits in RAM if swap available)
# ═══════════════════════════════════════════════════════════════════
version: '3.8'

services:

  # ─── Postgres ────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: amazon-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: amazon
      POSTGRES_PASSWORD: amazon123
    ports:
      - "5432:5432"
    volumes:
      - /opt/amazon-microservices/data/postgres:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    networks: [amazon-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amazon"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 160M
        reservations:
          memory: 80M

  # ─── Redis ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: amazon-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass redis123
      --maxmemory 64mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
    ports:
      - "6379:6379"
    volumes:
      - /opt/amazon-microservices/data/redis:/data
    networks: [amazon-net]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 96M
        reservations:
          memory: 48M

  # ─── Zookeeper ───────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: amazon-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_HEAP_OPTS: "-Xmx96m -Xms48m"
    volumes:
      - /opt/amazon-microservices/data/zookeeper:/var/lib/zookeeper/data
    networks: [amazon-net]
    deploy:
      resources:
        limits:
          memory: 160M
        reservations:
          memory: 80M

  # ─── Kafka ───────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: amazon-kafka
    restart: unless-stopped
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_HEAP_OPTS: "-Xmx256m -Xms128m"
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - /opt/amazon-microservices/data/kafka:/var/lib/kafka/data
    networks: [amazon-net]
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 320M
        reservations:
          memory: 192M

  # ─── Zipkin (slim image) ─────────────────────────────────────────
  zipkin:
    image: openzipkin/zipkin-slim:latest
    container_name: amazon-zipkin
    restart: unless-stopped
    ports:
      - "9411:9411"
    networks: [amazon-net]
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  # ─── User Service ────────────────────────────────────────────────
  user-service:
    image: ${ECR_REGISTRY}/amazon/user-service:${IMAGE_TAG:-latest}
    container_name: amazon-user-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: live
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/users_db
      SPRING_DATASOURCE_USERNAME: amazon
      SPRING_DATASOURCE_PASSWORD: amazon123
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 3
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PASSWORD: redis123
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_SECURITY_JWT_SECRET: ${JWT_SECRET:-amazon-super-secret-jwt-key-minimum-256-bits}
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "0.05"
      JAVA_OPTS: >-
        -Xms40m -Xmx96m
        -XX:+UseG1GC -XX:MaxGCPauseMillis=200
        -XX:+UseStringDeduplication
        -Djava.security.egd=file:/dev/./urandom
        -Dspring.jmx.enabled=false
    networks: [amazon-net]
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      kafka:    { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health | grep -q UP"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 160M
        reservations:
          memory: 80M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Product Service ─────────────────────────────────────────────
  product-service:
    image: ${ECR_REGISTRY}/amazon/product-service:${IMAGE_TAG:-latest}
    container_name: amazon-product-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: live
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/products_db
      SPRING_DATASOURCE_USERNAME: amazon
      SPRING_DATASOURCE_PASSWORD: amazon123
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 3
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PASSWORD: redis123
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "0.05"
      JAVA_OPTS: "-Xms40m -Xmx96m -XX:+UseG1GC -Djava.security.egd=file:/dev/./urandom -Dspring.jmx.enabled=false"
    networks: [amazon-net]
    depends_on:
      postgres: { condition: service_healthy }
      kafka:    { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health | grep -q UP"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 160M
        reservations:
          memory: 80M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Payment Service (before order — saga dependency) ────────────
  payment-service:
    image: ${ECR_REGISTRY}/amazon/payment-service:${IMAGE_TAG:-latest}
    container_name: amazon-payment-service
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: live
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/payments_db
      SPRING_DATASOURCE_USERNAME: amazon
      SPRING_DATASOURCE_PASSWORD: amazon123
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 3
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "0.05"
      JAVA_OPTS: "-Xms40m -Xmx96m -XX:+UseG1GC -Djava.security.egd=file:/dev/./urandom -Dspring.jmx.enabled=false"
    networks: [amazon-net]
    depends_on:
      postgres: { condition: service_healthy }
      kafka:    { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8084/actuator/health | grep -q UP"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 160M
        reservations:
          memory: 80M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Order Service ───────────────────────────────────────────────
  order-service:
    image: ${ECR_REGISTRY}/amazon/order-service:${IMAGE_TAG:-latest}
    container_name: amazon-order-service
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: live
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/orders_db
      SPRING_DATASOURCE_USERNAME: amazon
      SPRING_DATASOURCE_PASSWORD: amazon123
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 3
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PASSWORD: redis123
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "0.05"
      JAVA_OPTS: "-Xms40m -Xmx96m -XX:+UseG1GC -Djava.security.egd=file:/dev/./urandom -Dspring.jmx.enabled=false"
    networks: [amazon-net]
    depends_on:
      postgres:        { condition: service_healthy }
      kafka:           { condition: service_healthy }
      payment-service: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health | grep -q UP"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 160M
        reservations:
          memory: 80M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Notification Service ────────────────────────────────────────
  notification-service:
    image: ${ECR_REGISTRY}/amazon/notification-service:${IMAGE_TAG:-latest}
    container_name: amazon-notification-service
    restart: unless-stopped
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: live
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "0.02"
      JAVA_OPTS: "-Xms32m -Xmx64m -XX:+UseG1GC -Djava.security.egd=file:/dev/./urandom -Dspring.jmx.enabled=false"
    networks: [amazon-net]
    depends_on:
      kafka: { condition: service_healthy }
    deploy:
      resources:
        limits:
          memory: 96M
        reservations:
          memory: 48M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # ─── API Gateway ─────────────────────────────────────────────────
  api-gateway:
    image: ${ECR_REGISTRY}/amazon/api-gateway:${IMAGE_TAG:-latest}
    container_name: amazon-api-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "80:8080"
    environment:
      SPRING_PROFILES_ACTIVE: live
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PASSWORD: redis123
      SPRING_SECURITY_JWT_SECRET: ${JWT_SECRET:-amazon-super-secret-jwt-key-minimum-256-bits}
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
      JAVA_OPTS: "-Xms40m -Xmx96m -XX:+UseG1GC -Djava.security.egd=file:/dev/./urandom -Dspring.jmx.enabled=false"
    networks: [amazon-net]
    depends_on:
      user-service:    { condition: service_healthy }
      product-service: { condition: service_healthy }
      order-service:   { condition: service_healthy }
      payment-service: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 160M
        reservations:
          memory: 80M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  amazon-net:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
