# GitHub Actions CI compose - 7GB RAM available, locally built images
version: '3.8'

services:

  postgres:
    image: postgres:15-alpine
    container_name: ci-postgres
    environment:
      POSTGRES_USER: amazon
      POSTGRES_PASSWORD: amazon123
    ports:
      - "5432:5432"
    volumes:
      - ../init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - ci-net
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amazon"]
      interval: 5s
      timeout: 3s
      retries: 15
    deploy:
      resources:
        limits:
          memory: 256M

  redis:
    image: redis:7-alpine
    container_name: ci-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass redis123 --maxmemory 128mb
    networks:
      - ci-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis123", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 160M

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: ci-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_HEAP_OPTS: "-Xmx128m -Xms64m"
    networks:
      - ci-net
    deploy:
      resources:
        limits:
          memory: 192M

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ci-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_HEAP_OPTS: "-Xmx256m -Xms128m"
      KAFKA_LOG_RETENTION_MS: 300000
    networks:
      - ci-net
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 384M

  zipkin:
    image: openzipkin/zipkin-slim:latest
    container_name: ci-zipkin
    ports:
      - "9411:9411"
    networks:
      - ci-net
    deploy:
      resources:
        limits:
          memory: 128M

  user-service:
    image: amazon/user-service:latest
    container_name: ci-user-service
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: ci
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/users_db
      SPRING_DATASOURCE_USERNAME: amazon
      SPRING_DATASOURCE_PASSWORD: amazon123
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PASSWORD: redis123
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_SECURITY_JWT_SECRET: amazon-super-secret-jwt-key-2024-minimum-256-bits-required
      JAVA_OPTS: "-Xms64m -Xmx128m -XX:+UseG1GC -Djava.security.egd=file:/dev/./urandom"
    networks:
      - ci-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health | grep UP"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 256M

  product-service:
    image: amazon/product-service:latest
    container_name: ci-product-service
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: ci
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/products_db
      SPRING_DATASOURCE_USERNAME: amazon
      SPRING_DATASOURCE_PASSWORD: amazon123
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PASSWORD: redis123
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JAVA_OPTS: "-Xms64m -Xmx128m -XX:+UseG1GC -Djava.security.egd=file:/dev/./urandom"
    networks:
      - ci-net
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health | grep UP"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 256M

  order-service:
    image: amazon/order-service:latest
    container_name: ci-order-service
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: ci
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/orders_db
      SPRING_DATASOURCE_USERNAME: amazon
      SPRING_DATASOURCE_PASSWORD: amazon123
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PASSWORD: redis123
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JAVA_OPTS: "-Xms64m -Xmx128m -XX:+UseG1GC -Djava.security.egd=file:/dev/./urandom"
    networks:
      - ci-net
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health | grep UP"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 256M

  payment-service:
    image: amazon/payment-service:latest
    container_name: ci-payment-service
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: ci
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/payments_db
      SPRING_DATASOURCE_USERNAME: amazon
      SPRING_DATASOURCE_PASSWORD: amazon123
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JAVA_OPTS: "-Xms48m -Xmx96m -XX:+UseG1GC -Djava.security.egd=file:/dev/./urandom"
    networks:
      - ci-net
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8084/actuator/health | grep UP"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 192M

  notification-service:
    image: amazon/notification-service:latest
    container_name: ci-notification-service
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: ci
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JAVA_OPTS: "-Xms32m -Xmx64m -XX:+UseG1GC -Djava.security.egd=file:/dev/./urandom"
    networks:
      - ci-net
    depends_on:
      kafka:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M

  api-gateway:
    image: amazon/api-gateway:latest
    container_name: ci-api-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ci
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PASSWORD: redis123
      SPRING_SECURITY_JWT_SECRET: amazon-super-secret-jwt-key-2024-minimum-256-bits-required
      JAVA_OPTS: "-Xms48m -Xmx96m -XX:+UseG1GC -Djava.security.egd=file:/dev/./urandom"
    networks:
      - ci-net
    depends_on:
      user-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep UP"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 192M

networks:
  ci-net:
    driver: bridge
