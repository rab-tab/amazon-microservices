# ═══════════════════════════════════════════════════════════════════
# EC2 t2.micro Docker Compose
#
# Total memory budget: ~900MB usable (OS takes ~100MB)
#
# Memory allocation per container:
#   postgres:              (runs on RDS — not here)
#   redis:                 96MB
#   zookeeper:             160MB
#   kafka:                 256MB
#   user-service:          160MB  (JVM -Xmx96m)
#   product-service:       160MB  (JVM -Xmx96m)
#   order-service:         160MB  (JVM -Xmx96m)
#   payment-service:       128MB  (JVM -Xmx80m)
#   notification-service:  96MB   (JVM -Xmx64m)
#   api-gateway:           128MB  (JVM -Xmx80m)
#   ─────────────────────────────────────────────
#   Total:                ~1,344MB  ← needs swap
#
# IMPORTANT: Enable 2GB swap on EC2 before running (see setup script)
# ═══════════════════════════════════════════════════════════════════

version: '3.8'

services:

  # ─── Redis (no RDS equivalent — runs on EC2) ─────────────────
  redis:
    image: redis:7-alpine
    container_name: amazon-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis123}
      --maxmemory 64mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    ports:
      - "6379:6379"
    networks:
      - amazon-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 96M
        reservations:
          memory: 48M

  # ─── Zookeeper ────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: amazon-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_HEAP_OPTS: "-Xmx96m -Xms48m"
    networks:
      - amazon-net
    deploy:
      resources:
        limits:
          memory: 160M
        reservations:
          memory: 80M

  # ─── Kafka ────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: amazon-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_HEAP_OPTS: "-Xmx192m -Xms96m"
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_SEGMENT_BYTES: 10485760
    networks:
      - amazon-net
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 160M

  # ─── User Service ─────────────────────────────────────────────
  user-service:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/amazon/user-service:${IMAGE_TAG:-latest}
    container_name: amazon-user-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: ec2
      SERVER_PORT: 8081
      # Point to RDS (not localhost postgres)
      SPRING_DATASOURCE_URL: jdbc:postgresql://${DB_HOST}:5432/users_db
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-amazon}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-amazon123}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_SECURITY_JWT_SECRET: ${JWT_SECRET}
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://localhost:9411/api/v2/spans
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "0.1"   # 10% sampling — saves memory
      JAVA_OPTS: >-
        -Xms48m -Xmx96m
        -XX:+UseG1GC
        -XX:MaxGCPauseMillis=200
        -XX:+UseStringDeduplication
        -Djava.security.egd=file:/dev/./urandom
      SPRING_JPA_PROPERTIES_HIBERNATE_JDBC_BATCH_SIZE: 20
    networks:
      - amazon-net
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health | grep UP"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 160M
        reservations:
          memory: 80M

  # ─── Product Service ──────────────────────────────────────────
  product-service:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/amazon/product-service:${IMAGE_TAG:-latest}
    container_name: amazon-product-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: ec2
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:postgresql://${DB_HOST}:5432/products_db
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-amazon}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-amazon123}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "0.1"
      JAVA_OPTS: "-Xms48m -Xmx96m -XX:+UseG1GC -Djava.security.egd=file:/dev/./urandom"
    networks:
      - amazon-net
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health | grep UP"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 160M
        reservations:
          memory: 80M

  # ─── Order Service ────────────────────────────────────────────
  order-service:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/amazon/order-service:${IMAGE_TAG:-latest}
    container_name: amazon-order-service
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: ec2
      SERVER_PORT: 8083
      SPRING_DATASOURCE_URL: jdbc:postgresql://${DB_HOST}:5432/orders_db
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-amazon}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-amazon123}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "0.1"
      JAVA_OPTS: "-Xms48m -Xmx96m -XX:+UseG1GC -Djava.security.egd=file:/dev/./urandom"
    networks:
      - amazon-net
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health | grep UP"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 160M
        reservations:
          memory: 80M

  # ─── Payment Service ──────────────────────────────────────────
  payment-service:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/amazon/payment-service:${IMAGE_TAG:-latest}
    container_name: amazon-payment-service
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: ec2
      SERVER_PORT: 8084
      SPRING_DATASOURCE_URL: jdbc:postgresql://${DB_HOST}:5432/payments_db
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-amazon}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-amazon123}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "0.1"
      JAVA_OPTS: "-Xms40m -Xmx80m -XX:+UseG1GC -Djava.security.egd=file:/dev/./urandom"
    networks:
      - amazon-net
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8084/actuator/health | grep UP"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  # ─── Notification Service ─────────────────────────────────────
  notification-service:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/amazon/notification-service:${IMAGE_TAG:-latest}
    container_name: amazon-notification-service
    restart: unless-stopped
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: ec2
      SERVER_PORT: 8085
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "0.05"
      JAVA_OPTS: "-Xms32m -Xmx64m -XX:+UseG1GC -Djava.security.egd=file:/dev/./urandom"
    networks:
      - amazon-net
    depends_on:
      kafka:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 96M
        reservations:
          memory: 48M

  # ─── API Gateway ─────────────────────────────────────────────
  api-gateway:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/amazon/api-gateway:${IMAGE_TAG:-latest}
    container_name: amazon-api-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "80:8080"    # Map port 80 → gateway so no port in URL
    environment:
      SPRING_PROFILES_ACTIVE: ec2
      SERVER_PORT: 8080
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
      SPRING_SECURITY_JWT_SECRET: ${JWT_SECRET}
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "0.1"
      JAVA_OPTS: "-Xms40m -Xmx80m -XX:+UseG1GC -Djava.security.egd=file:/dev/./urandom"
    networks:
      - amazon-net
    depends_on:
      user-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep UP"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

networks:
  amazon-net:
    driver: bridge
